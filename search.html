<!DOCTYPE html>
<html lang="ru">
<head>

    <header class="header">
        <div class="container header__container">
            <a href="index.html" class="logo">Кино<span>Поиск</span></a>
            <nav><ul class="nav-list">
               <li><a href="index.html" class="nav-link active">Главная</a></li>
